[package]
name = "maxrects-packer"
version = "0.1.0"
edition = "2021"
description = "Max rectangle 2D bin packer compiled to WebAssembly"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
simd = []
parallel = ["rayon"]

[dependencies]
serde = { version = "1", features = ["derive"] }
wasm-bindgen = "=0.2.100"

[dependencies.rayon]
version = "1"
optional = true

[dev-dependencies]
wasm-bindgen-test = "=0.3.50"
rand = "0.8"
rand_chacha = "0.3"

[package.metadata.wasm-pack.profile.release]
# wasm-opt 108 mishandles externref table exports; skip it
# (Rust opt-level=3 + LTO already optimizes the binary well)
wasm-opt = false

[profile.release]
opt-level = 3
lto = true
